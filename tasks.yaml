apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: npm
spec:
  workspaces:
    - name: source
  steps:
    - name: npminstall
      image: node:20-buster-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -e
        # Check if the code is in a subfolder and move into it
        if [ -d "zntwk-tax_calculator" ]; then cd zntwk-tax_calculator; fi
        echo "***** Environment *****"
        npm --version
        pwd
        echo "***** Cleaning npm cache *****"
        npm cache clean --force
        echo "***** Running npm install *****"
        npm install
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: jasmine
spec:
  workspaces:
    - name: source
  steps:
    - name: jasminetests
      image: node:20-buster-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -e
        # Check if the code is in a subfolder and move into it
        if [ -d "zntwk-tax_calculator" ]; then cd zntwk-tax_calculator; fi
        echo "***** Running jasminetests *****"
        npx jasmine